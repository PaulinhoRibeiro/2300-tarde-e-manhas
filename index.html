<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Estudo | 2300 Tardes e Manhãs - Daniel 8:14</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            background-image: radial-gradient(circle at 25% 40%, rgba(139, 90, 43, 0.1) 0%, rgba(10, 12, 18, 1) 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        .presentation-container {
            max-width: 1600px;
            width: 100%;
            height: 96vh;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
        }

        .theme-header {
            text-align: center;
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }

        .theme-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E8C58B, #C7924C, #B57C3A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .scripture-ref {
            font-size: 0.95rem;
            font-family: 'Cormorant Garamond', serif;
            color: #D4A76A;
        }

        .verse-quote {
            background: rgba(30, 25, 20, 0.5);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            color: #E9CCA7;
            border-left: 3px solid #C7924C;
        }

        .counter-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.2rem 1rem;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            color: #E7BD7A;
            border: 1px solid rgba(200, 140, 70, 0.5);
        }

        .carousel-wrapper {
            position: relative;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .carousel-viewport {
            overflow: hidden;
            border-radius: 0.8rem;
            position: relative;
            flex: 1;
            min-height: 0;
            background: #07090e;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 0.92, 0.4, 1);
            will-change: transform;
            height: 100%;
        }

        .carousel-slide {
            flex: 0 0 100%;
            list-style: none;
            position: relative;
            height: 100%;
        }

        .image-frame {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0e14;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.8rem;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .slide-caption {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #F3D9A2;
            border-left: 3px solid #B87C3A;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }

        .carousel-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 0.6rem;
            margin-bottom: 0.4rem;
            flex-shrink: 0;
        }

        .nav-btn {
            background: rgba(25, 28, 38, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 146, 76, 0.5);
            color: #E7C48B;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: #B87C3A;
            color: #1F1B10;
            transform: scale(1.04);
        }

        .page-indicator {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 0.35rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #F3DEB2;
            font-family: monospace;
            border: 1px solid rgba(184, 124, 58, 0.6);
        }

        .thumb-strip {
            margin-top: 0.6rem;
            flex-shrink: 0;
        }

        .thumb-scroll {
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: #B87C3A #2A251E;
            padding-bottom: 6px;
        }

        .thumb-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .thumb-scroll::-webkit-scrollbar-track {
            background: #211D17;
            border-radius: 10px;
        }
        .thumb-scroll::-webkit-scrollbar-thumb {
            background: #B87C3A;
            border-radius: 10px;
        }

        .thumb-list {
            display: flex;
            gap: 0.6rem;
            list-style: none;
        }

        .thumb-item {
            flex: 0 0 70px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            opacity: 0.65;
        }

        .thumb-item.active-thumb {
            border-color: #D99E4C;
            opacity: 1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(184, 124, 58, 0.4);
        }

        .thumb-item img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            border-radius: 8px;
        }

        .thumb-item:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            color: #BFAB8A;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.25);
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            flex-shrink: 0;
        }

        .progress-timer {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .progress-bar-container {
            width: 120px;
            height: 3px;
            background: #2F2A22;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #D99E4C, #B87C3A);
            border-radius: 3px;
        }

        .toggle-auto {
            background: none;
            border: 1px solid #B87C3A60;
            color: #E7C48B;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .toggle-auto.active {
            background: #B87C3A30;
            border-color: #D99E4C;
        }

        .debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffaa66;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 999;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .presentation-container { height: 98vh; }
            .theme-header h1 { font-size: 1.4rem; }
            .thumb-item { flex: 0 0 55px; }
            .nav-btn { width: 38px; height: 38px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="presentation-container">
    <div class="theme-header">
        <h1>📜 2300 TARDES E MANHÃS</h1>
        <div class="scripture-ref">Daniel 8:14 — "Até duas mil e trezentas tardes e manhãs; e o santuário será purificado."</div>
        <div class="verse-quote"><i class="fas fa-scroll"></i> Estudo profético</div>
        <div class="counter-badge" id="imageCounterBadge">Carregando imagens...</div>
    </div>

    <div class="carousel-wrapper">
        <div class="carousel-viewport">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>

        <div class="carousel-controls">
            <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
            <div class="page-indicator" id="pageIndicator">-- / --</div>
            <button class="nav-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="thumb-strip">
            <div class="thumb-scroll" id="thumbScroll">
                <ul class="thumb-list" id="thumbList"></ul>
            </div>
        </div>

        <div class="info-bar">
            <div class="progress-timer">
                <i class="fas fa-hourglass-half"></i>
                <span>Auto</span>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <button class="toggle-auto" id="toggleAutoBtn">⏸ Pausar</button>
            </div>
            <div><i class="fas fa-star-of-david"></i> 2300 tardes e manhãs</div>
        </div>
    </div>
</div>

<div class="debug-info" id="debugInfo">Aguardando imagens...</div>

<script>
    // ===============================================
    // CARREGAMENTO DE IMAGENS: img1.png, img2.png ... img23.png
    // Também aceita .jpg e .jpeg como fallback
    // ===============================================
    
    const TOTAL_SLIDES = 23;
    const FORMATS = ['.png', '.jpg', '.jpeg'];
    const IMAGE_PREFIX = 'img';  // <--- CORRIGIDO: agora procura por "img1", "img2", etc.
    
    let imageUrls = new Array(TOTAL_SLIDES).fill(null);
    let imagesReady = 0;
    let currentIndex = 0;
    let isAutoPlaying = true;
    let autoDelay = 6000;
    let progressInterval = null;
    let progressWidth = 0;
    
    const track = document.getElementById('carouselTrack');
    const thumbList = document.getElementById('thumbList');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const toggleAutoBtn = document.getElementById('toggleAutoBtn');
    const progressFill = document.getElementById('progressFill');
    const imageCounterBadge = document.getElementById('imageCounterBadge');
    const debugInfo = document.getElementById('debugInfo');
    
    function tryLoadImage(index, formatIndex) {
        return new Promise((resolve) => {
            if (formatIndex >= FORMATS.length) {
                createFallbackImage(index).then(resolve);
                return;
            }
            
            const format = FORMATS[formatIndex];
            const imgPath = `${IMAGE_PREFIX}${index + 1}${format}`;
            const img = new Image();
            
            img.onload = () => {
                debugInfo.innerHTML = `✅ ${imgPath} carregada!`;
                console.log(`✓ Encontrada: ${imgPath}`);
                resolve(imgPath);
            };
            
            img.onerror = () => {
                tryLoadImage(index, formatIndex + 1).then(resolve);
            };
            
            img.src = imgPath;
        });
    }
    
    function createFallbackImage(index) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            canvas.width = 1920;
            canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#1a1410');
            grad.addColorStop(1, '#0a0c12');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(200, 150, 80, 0.08)';
            ctx.beginPath();
            ctx.arc(canvas.width - 120, 120, 70, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(120, canvas.height - 120, 90, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.font = `bold ${Math.floor(canvas.width * 0.045)}px 'Cormorant Garamond', serif`;
            ctx.fillStyle = '#E8C58B';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 8;
            ctx.fillText(`${IMAGE_PREFIX}${index + 1}`, canvas.width/2, canvas.height * 0.25);
            
            ctx.font = `${Math.floor(canvas.width * 0.035)}px 'Cormorant Garamond', serif`;
            ctx.fillStyle = '#D4A373';
            ctx.fillText(`2300 TARDES E MANHÃS`, canvas.width/2, canvas.height * 0.35);
            
            ctx.font = `${Math.floor(canvas.width * 0.028)}px 'Inter', monospace`;
            ctx.fillStyle = '#C89D6B';
            ctx.fillText(`Daniel 8:14`, canvas.width/2, canvas.height * 0.45);
            
            ctx.font = `${Math.floor(canvas.width * 0.022)}px 'Inter', monospace`;
            ctx.fillStyle = '#B8875A';
            ctx.fillText(`"Até duas mil e trezentas tardes e manhãs;`, canvas.width/2, canvas.height * 0.55);
            ctx.fillText(`e o santuário será purificado."`, canvas.width/2, canvas.height * 0.62);
            
            ctx.font = `${Math.floor(canvas.width * 0.018)}px monospace`;
            ctx.fillStyle = '#9E7650';
            ctx.fillText(`imagem ${index + 1} de 23 (fallback)`, canvas.width/2, canvas.height * 0.85);
            
            ctx.shadowBlur = 0;
            
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                debugInfo.innerHTML = `⚠️ ${IMAGE_PREFIX}${index + 1} não encontrada - usando fallback`;
                console.warn(`✗ Nenhum formato encontrado para ${IMAGE_PREFIX}${index + 1}`);
                resolve(url);
            }, 'image/png');
        });
    }
    
    async function loadAllImages() {
        debugInfo.innerHTML = `🔍 Procurando ${IMAGE_PREFIX}1.png, ${IMAGE_PREFIX}1.jpg, ...`;
        
        for (let i = 0; i < TOTAL_SLIDES; i++) {
            const imgUrl = await tryLoadImage(i, 0);
            imageUrls[i] = imgUrl;
            imagesReady++;
            imageCounterBadge.innerHTML = `📖 Carregando... ${imagesReady}/${TOTAL_SLIDES} imagens`;
        }
        
        debugInfo.innerHTML = `✅ ${TOTAL_SLIDES} imagens prontas! (${IMAGE_PREFIX}1...${IMAGE_PREFIX}${TOTAL_SLIDES})`;
        imageCounterBadge.innerHTML = `📖 ${TOTAL_SLIDES} imagens · ${IMAGE_PREFIX}1 → ${IMAGE_PREFIX}${TOTAL_SLIDES} · santuário purificado`;
        
        buildCarousel();
        startAutoSlide();
    }
    
    function buildCarousel() {
        track.innerHTML = '';
        thumbList.innerHTML = '';
        
        imageUrls.forEach((src, idx) => {
            const slide = document.createElement('li');
            slide.className = 'carousel-slide';
            const frame = document.createElement('div');
            frame.className = 'image-frame';
            const img = document.createElement('img');
            img.src = src;
            img.alt = `${IMAGE_PREFIX}${idx+1} - 2300 tardes e manhãs`;
            frame.appendChild(img);
            slide.appendChild(frame);
            
            const caption = document.createElement('div');
            caption.className = 'slide-caption';
            caption.innerHTML = `<i class="fas fa-sun"></i> <strong>${IMAGE_PREFIX}${idx+1}</strong> · ${idx+1}/23  ·  Daniel 8:14`;
            slide.appendChild(caption);
            track.appendChild(slide);
            
            const thumbItem = document.createElement('li');
            thumbItem.className = 'thumb-item';
            const thumbImg = document.createElement('img');
            thumbImg.src = src;
            thumbImg.alt = `thumb ${IMAGE_PREFIX}${idx+1}`;
            thumbItem.appendChild(thumbImg);
            thumbItem.dataset.index = idx;
            thumbItem.addEventListener('click', () => {
                if (isAutoPlaying) stopAutoSlide();
                goToSlide(idx);
                if (isAutoPlaying) startAutoSlide();
            });
            thumbList.appendChild(thumbItem);
        });
        
        updateActiveThumb();
        updateIndicator();
        updateTrackPosition();
        resetProgressBar();
    }
    
    function updateTrackPosition() {
        if (!track.parentElement) return;
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
    }
    
    function goToSlide(index) {
        if (index < 0) index = 0;
        if (index >= TOTAL_SLIDES) index = TOTAL_SLIDES - 1;
        if (currentIndex === index) return;
        currentIndex = index;
        updateTrackPosition();
        updateIndicator();
        updateActiveThumb();
        resetProgressBar();
        scrollThumbIntoView();
    }
    
    function nextSlide() {
        goToSlide(currentIndex + 1 >= TOTAL_SLIDES ? 0 : currentIndex + 1);
    }
    
    function prevSlide() {
        goToSlide(currentIndex - 1 < 0 ? TOTAL_SLIDES - 1 : currentIndex - 1);
    }
    
    function updateIndicator() {
        pageIndicator.innerText = `${String(currentIndex + 1).padStart(2, '0')} / ${TOTAL_SLIDES}`;
    }
    
    function updateActiveThumb() {
        const thumbs = document.querySelectorAll('.thumb-item');
        thumbs.forEach((thumb, i) => {
            if (i === currentIndex) thumb.classList.add('active-thumb');
            else thumb.classList.remove('active-thumb');
        });
    }
    
    function scrollThumbIntoView() {
        const active = document.querySelector('.thumb-item.active-thumb');
        if (active && document.getElementById('thumbScroll')) {
            active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    }
    
    function resetProgressBar() {
        if (progressInterval) clearInterval(progressInterval);
        progressWidth = 0;
        progressFill.style.width = '0%';
        if (isAutoPlaying) startProgressTimer();
    }
    
    function startProgressTimer() {
        if (progressInterval) clearInterval(progressInterval);
        const stepMs = 30;
        const increment = (stepMs / autoDelay) * 100;
        progressWidth = 0;
        
        progressInterval = setInterval(() => {
            if (!isAutoPlaying) return;
            progressWidth += increment;
            if (progressWidth >= 100) {
                progressFill.style.width = '100%';
                clearInterval(progressInterval);
                nextSlide();
            } else {
                progressFill.style.width = `${Math.min(progressWidth, 100)}%`;
            }
        }, stepMs);
    }
    
    function stopAutoSlide() {
        if (progressInterval) clearInterval(progressInterval);
        isAutoPlaying = false;
        toggleAutoBtn.innerHTML = '▶ Iniciar Auto';
        toggleAutoBtn.classList.remove('active');
    }
    
    function startAutoSlide() {
        if (progressInterval) clearInterval(progressInterval);
        isAutoPlaying = true;
        toggleAutoBtn.innerHTML = '⏸ Pausar';
        toggleAutoBtn.classList.add('active');
        resetProgressBar();
    }
    
    function toggleAutoMode() {
        if (isAutoPlaying) stopAutoSlide();
        else startAutoSlide();
    }
    
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => updateTrackPosition(), 100);
    });
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            const wasAuto = isAutoPlaying;
            if (wasAuto) stopAutoSlide();
            prevSlide();
            if (wasAuto) startAutoSlide();
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            const wasAuto = isAutoPlaying;
            if (wasAuto) stopAutoSlide();
            nextSlide();
            if (wasAuto) startAutoSlide();
        }
    });
    
    prevBtn.addEventListener('click', () => {
        const wasAuto = isAutoPlaying;
        if (wasAuto) stopAutoSlide();
        prevSlide();
        if (wasAuto) startAutoSlide();
    });
    
    nextBtn.addEventListener('click', () => {
        const wasAuto = isAutoPlaying;
        if (wasAuto) stopAutoSlide();
        nextSlide();
        if (wasAuto) startAutoSlide();
    });
    
    toggleAutoBtn.addEventListener('click', toggleAutoMode);
    
    loadAllImages();
</script>
</body>
</html>
